
<div class="app-container">
  <header class="sticky top-0 z-50 bg-white border-b border-gray-100" data-purpose="main-navigation">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <!-- Logo -->
        <div class="flex-shrink-0 flex items-center">
          <div class="w-10 h-10 bg-primary rounded-custom flex items-center justify-center mr-2">
            <span class="text-white font-extrabold text-xl">T</span>
          </div>
          <span class="text-2xl font-extrabold tracking-tight text-dark-gray">Ticket-H</span>
        </div>
        <!-- Desktop Nav -->
        <nav class="hidden md:flex space-x-8">
          <a class="text-sm font-semibold text-dark-gray hover:text-primary transition-colors" href="/booking-events-ticket-online">Home</a>
          <a class="text-sm font-semibold text-dark-gray hover:text-primary transition-colors" href="/booking-events-ticket-online">Explore</a>
          <a class="text-sm font-semibold text-dark-gray hover:text-primary transition-colors" href="#">Categories</a>
          <a class="text-sm font-semibold text-dark-gray hover:text-primary transition-colors" href="#">About Us</a>
        </nav>
        <!-- Profile / CTA -->
        <div class="flex items-center space-x-4" *ngIf="!isLogin">
          <a class="hidden md:block text-sm font-semibold text-dark-gray hover:text-primary transition-colors" href="/login">
            Sign
            In
          </a>
          <button class="bg-primary text-white px-6 py-2.5 rounded-custom font-semibold text-sm hover:bg-primary-dark transition-colors shadow-sm">
            Create Event
          </button>
        </div>

        <div class="relative flex items-center gap-3 cursor-pointer select-none" *ngIf="isLogin" (click)="toggleDropdown($event)">
          <div class="text-right">
            <p class="text-sm font-semibold text-white leading-tight">Admin User</p>
            <p class="text-xs text-gray-400 leading-tight">System Manager</p>
          </div>

          <div class="w-9 h-9 rounded-full bg-indigo-500/20 border border-indigo-400/40 flex items-center justify-center text-indigo-300">
            <span class="material-symbols-outlined text-[20px]">shield_person</span>
          </div>

          <!-- Dropdown -->
          <div *ngIf="isDropdownOpen"
               (click)="$event.stopPropagation()"
               class="absolute right-0 top-full mt-2 w-44 rounded-xl bg-gray-900 border border-white/10 shadow-xl shadow-black/40 overflow-hidden z-50">
            
            <button
              class="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-gray-300 hover:bg-white/10 hover:text-white transition-colors"
              (click)="goProfile()"
            >
              <span class="material-symbols-outlined text-[18px]">person</span>
              Profile
            </button>
      

            <button class="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-gray-300 hover:bg-red-500/10 hover:text-red-400 transition-colors"
                    (click)="logout()">
              <span class="material-symbols-outlined text-[18px]">logout</span>
              Logout
            </button>
          </div>
        </div>

      </div>
    </div>
  </header>
  <div class="layout-body">
    <main class="user-main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
