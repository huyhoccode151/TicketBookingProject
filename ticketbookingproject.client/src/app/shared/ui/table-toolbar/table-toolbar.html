<div class="p-4 border-b border-slate-100 flex flex-col md:flex-row gap-4 items-center">
  <div class="flex flex-wrap items-center gap-2">
    <!-- Search -->
    <div class="relative flex-1 w-full min-w-3xl">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
        search
      </span>

      <input type="text"
             class="w-full pl-10 pr-4 py-2 bg-slate-50 rounded-lg focus:ring-2 focus:ring-primary/50 text-sm"
             placeholder="Search..."
             (input)="onSearch($event)" />
    </div>

    <!-- Actions -->

    <ng-content></ng-content>
  </div>

</div>
