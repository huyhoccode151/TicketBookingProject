<div class="login-page">
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">B</div>
      <span class="logo-text">Barren</span>
    </div>
    <div class="header-right">
      <span class="signup-text">New to Barren?</span>
      <a routerLink="/register" class="signup-link">Sign up</a>
    </div>
  </header>

  <!-- Main Form -->
  <main class="login-content">
    <div class="form-container">
      <h1 class="form-title">Sign in to Barren</h1>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Username Field -->
        <div class="form-group">
          <label class="form-label" for="username">Your Username*</label>
          <input id="username"
                 type="email"
                 class="form-input"
                 [class.is-error]="submitted && usernameControl.invalid"
                 formControlName="username"
                 placeholder="Enter your username"
                 autocomplete="username" />
          <span class="error-msg" *ngIf="submitted && usernameControl.invalid">
            <ng-container *ngIf="usernameControl.errors?.['required']">Username is required.</ng-container>
            <ng-container *ngIf="usernameControl.errors?.['username']">Please enter a valid username.</ng-container>
          </span>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <div class="label-row">
            <label class="form-label" for="password">Password*</label>
            <a routerLink="/forgot-password" class="forgot-link">Forgot Password?</a>
          </div>
          <div class="input-wrapper">
            <input id="password"
                   [type]="showPassword ? 'text' : 'password'"
                   class="form-input"
                   [class.is-error]="submitted && passwordControl.invalid"
                   formControlName="password"
                   placeholder="Enter your password"
                   autocomplete="current-password" />
            <button type="button"
                    class="toggle-password"
                    (click)="togglePassword()"
                    [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <span class="error-msg" *ngIf="submitted && passwordControl.invalid">
            <ng-container *ngIf="passwordControl.errors?.['required']">Password is required.</ng-container>
            <ng-container *ngIf="passwordControl.errors?.['minlength']">Password must be at least 6 characters.</ng-container>
          </span>
        </div>

        <!-- Error Alert -->
        <div class="alert alert-error" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <!-- Submit Button -->
        <button type="submit"
                class="btn-signin"
                [disabled]="isLoading">
          <span *ngIf="!isLoading">
            Sign In
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
              <polyline points="10 17 15 12 10 7" />
              <line x1="15" y1="12" x2="3" y2="12" />
            </svg>
          </span>
          <span *ngIf="isLoading" class="spinner"></span>
        </button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span>or</span>
      </div>

      <!-- Social Buttons -->
      <div class="social-buttons">
        <button type="button" class="btn-social" (click)="signInWithGoogle()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
          </svg>
          Sign in with Google
        </button>

        <button type="button" class="btn-social" (click)="signInWithFacebook()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="12" fill="#1877F2" />
            <path d="M16.5 8H14c-.3 0-.5.2-.5.5V10h3l-.4 2.5H13.5V19h-2.5v-6.5H9V10h2V8.5C11 6.6 12.3 5 14.5 5H16.5V8z" fill="white" />
          </svg>
          Sign in with Facebook
        </button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2024, Barren. All rights reserved. Powered by Gambolthemes</p>
  </footer>
</div>
