<div class="p-8 max-w-7xl">
  <app-page-header title="AuditLog Management"
                   subtitle="Manage and monitor all platform participants.">

    <a class="bg-primary hover:bg-primary/90 text-white px-5 py-2.5 rounded-lg text-sm font-bold flex items-center gap-2" href="/users/create">

      <span class="material-symbols-outlined text-base">
        add
      </span>

      Export Logs

    </a>

  </app-page-header>
  <app-data-table>
    <!-- Filters Bar -->
    <app-table-toolbar (search)="onSearch($event)">
      <app-filter-select label="Action"
                         [options]="actionOptions"
                         [value]="filter.action"
                         (valueChange)="filter.action=$event; loadLogs()">
      </app-filter-select>

    </app-table-toolbar>

    <!-- Table -->
    <table class="w-full text-left border-collapse">

      <thead>
        <tr class="bg-slate-50 dark:bg-slate-800/50">
          <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500">#</th>
          <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500">Action</th>
          <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500">Entity</th>
          <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500">User</th>
          <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500">Description</th>
          <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500">Time</th>
          <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500 text-right">Actions</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-slate-100 dark:divide-slate-800">

        <tr *ngFor="let log of logs; let i = index"
            class="hover:bg-slate-50/50 dark:hover:bg-slate-800/30 transition-colors">

          <!-- Index -->
          <td class="px-6 py-4">
            {{ (page - 1) * pageSize + i + 1 }}
          </td>

          <!-- Action -->
          <td class="px-6 py-4">
            <span class="font-semibold text-sm text-blue-600">
              {{ log.action }}
            </span>
          </td>

          <!-- Entity -->
          <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">
            {{ log.entityType }} #{{ log.entityId }}
          </td>

          <!-- User -->
          <td class="px-6 py-4 text-sm">
            {{ log.user?.email || log.user?.username || 'System' }}
          </td>

          <!-- Description -->
          <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">
            {{ log.description }}
          </td>

          <!-- Time -->
          <td class="px-6 py-4 text-sm text-slate-500">
            {{ log.createdAt | date:'dd/MM/yyyy HH:mm' }}
          </td>

          <!-- Actions -->
          <td class="px-6 py-4 text-right">
            <button class="text-blue-500 hover:underline text-sm"
                    (click)="viewDetail(log)">
              View
            </button>
          </td>

        </tr>

      </tbody>

    </table>

    <!-- Pagination -->
    <app-pagination [page]="page"
                    [pageSize]="pageSize"
                    [totalPages]="totalPages"
                    [totalCount]="totalCount"
                    (pageChange)="onPageChange($event)">
    </app-pagination>

  </app-data-table>
  <!-- Audit Table -->
</div>
