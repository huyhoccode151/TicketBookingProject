
<div class="change-password-container">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <app-card icon="security" title="Account Settings" class="change-password-card">
      <!-- Password -->
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium" for="password">Password</label>
        <input class="rounded-lg border border-slate-200 bg-slate-50 px-4 py-2 text-sm transition-colors focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-800"
               formControlName="password" placeholder="••••••••" type="password" />
        <span class="error-msg" *ngIf="isInvalid('password')">
          <ng-container *ngIf="form.get('password')?.errors?.['required']">Password is required.</ng-container>
          <ng-container *ngIf="form.get('password')?.errors?.['serverError']">
            {{ form.get('password')?.errors?.['serverError'] }}
          </ng-container>
        </span>
      </div>
      <!-- New Password -->
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium" for="newpassword">New Password</label>
        <input class="rounded-lg border border-slate-200 bg-slate-50 px-4 py-2 text-sm transition-colors focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-800"
               formControlName="newpassword" placeholder="••••••••" type="password" />
        <span class="error-msg" *ngIf="isInvalid('newpassword')">
          <ng-container *ngIf="form.get('newpassword')?.errors?.['required']">New Password is required.</ng-container>
          <ng-container *ngIf="form.get('newpassword')?.errors?.['serverError']">
            {{ form.get('newpassword')?.errors?.['serverError'] }}
          </ng-container>
        </span>
      </div>
      <!-- Confirm Password -->
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium" for="confirmpassword">Confirm Password</label>
        <input class="rounded-lg border border-slate-200 bg-slate-50 px-4 py-2 text-sm transition-colors focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary dark:border-slate-700 dark:bg-slate-800"
               formControlName="confirmpassword" placeholder="••••••••" type="password" />
        <span class="error-msg" *ngIf="isInvalid('confirmpassword')">
          <ng-container *ngIf="form.get('confirmpassword')?.errors?.['required']">Confirm Password is required.</ng-container>
          <ng-container *ngIf="form.get('confirmpassword')?.errors?.['serverError']">
            {{ form.get('confirmpassword')?.errors?.['serverError'] }}
          </ng-container>
        </span>
      </div>
    </app-card>
    <div class="flex flex-col sm:flex-row justify-end gap-3 pt-6 pb-12 border-t border-slate-200 dark:border-slate-800">
      <a href="/users" class="px-8 py-3 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-lg text-sm font-bold hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
        Cancel Changes
      </a>
      <button class="px-8 py-3 bg-primary text-white rounded-lg text-sm font-bold hover:bg-primary/90 transition-all shadow-md shadow-primary/20" type="submit">
        Change Password
      </button>
    </div>
  </form>
</div>
